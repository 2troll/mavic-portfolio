name: Build & Deploy to Surge

on:
  push:
    branches:
      - main
      - claude/premium-3d-portfolio-rebuild-Qom7g
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add 200.html for SPA client-side routing
        run: cp dist/index.html dist/200.html

      - name: Deploy to Surge
        run: npx surge dist mavic-portfolio.surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
