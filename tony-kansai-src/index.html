<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>Tony Hanma — Private Kansai Guide · Japan</title>
    <meta name="description" content="100% private tours in Osaka, Kyoto, Nara &amp; Kansai. Expert guides in English, Spanish, Arabic, Czech and Russian. Book your Japan experience today." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tonykansaiguide.com/" />

    <!-- hreflang — multilingual, single-URL SPA -->
    <link rel="alternate" hreflang="en" href="https://tonykansaiguide.com/" />
    <link rel="alternate" hreflang="es" href="https://tonykansaiguide.com/" />
    <link rel="alternate" hreflang="ar" href="https://tonykansaiguide.com/" />
    <link rel="alternate" hreflang="cs" href="https://tonykansaiguide.com/" />
    <link rel="alternate" hreflang="ru" href="https://tonykansaiguide.com/" />
    <link rel="alternate" hreflang="x-default" href="https://tonykansaiguide.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tonykansaiguide.com/" />
    <meta property="og:title" content="Tony Hanma — Private Japan Guide · Kansai" />
    <meta property="og:description" content="100% private tours in Osaka, Kyoto &amp; Kansai. Guided in English, Spanish, Arabic, Czech and Russian. The Japan you deserve." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1200&h=630&q=80" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Fushimi Inari torii gates at dawn in Kyoto, Japan" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="ar_SA" />
    <meta property="og:locale:alternate" content="cs_CZ" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta property="og:site_name" content="Tony Kansai Guide" />

    <!-- Twitter Card (also used by iMessage, Telegram, etc.) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tony Hanma — Private Japan Guide · Kansai" />
    <meta name="twitter:description" content="100% private tours in Osaka, Kyoto &amp; Kansai. Guided in English, Spanish, Arabic, Czech and Russian." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1200&h=630&q=80" />

    <!-- JSON-LD: LocalBusiness + TourOperator -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "TouristInformationCenter"],
      "name": "Tony Hanma Private Kansai Tours",
      "description": "100% private guided tours in Osaka, Kyoto, Nara and Kansai Japan in English, Spanish, Arabic, Czech and Russian.",
      "url": "https://tonykansaiguide.com",
      "telephone": "+34634193106",
      "priceRange": "¥¥¥",
      "image": "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1200&h=630&q=80",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5.0",
        "reviewCount": "5",
        "bestRating": "5"
      },
      "areaServed": [
        { "@type": "City", "name": "Osaka" },
        { "@type": "City", "name": "Kyoto" },
        { "@type": "City", "name": "Nara" },
        { "@type": "City", "name": "Kobe" },
        { "@type": "Place", "name": "Kōyasan" }
      ],
      "availableLanguage": [
        { "@type": "Language", "name": "English" },
        { "@type": "Language", "name": "Spanish" },
        { "@type": "Language", "name": "Arabic" },
        { "@type": "Language", "name": "Czech" },
        { "@type": "Language", "name": "Russian" },
        { "@type": "Language", "name": "Japanese" }
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage (home page quick answers for Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Are tours truly private?",
          "acceptedAnswer": { "@type": "Answer", "text": "100% private — your booking is exclusively yours. No other groups, no shared coaches. Just you and Tony with full attention on your experience." }
        },
        {
          "@type": "Question",
          "name": "How far in advance should I book?",
          "acceptedAnswer": { "@type": "Answer", "text": "Tony recommends 2–3 weeks ahead for weekends and peak seasons (March–May cherry blossom, October–November autumn). Weekday slots often available 1 week out." }
        },
        {
          "@type": "Question",
          "name": "What is the cancellation policy?",
          "acceptedAnswer": { "@type": "Answer", "text": "Full refund 72+ hours before the tour. 50% refund within 48 hours. No refund within 24 hours. Tony is flexible with reschedules — just reach out via WhatsApp." }
        },
        {
          "@type": "Question",
          "name": "Which languages do the guides speak?",
          "acceptedAnswer": { "@type": "Answer", "text": "Tony guides in English, Spanish and Arabic. Johnny guides in English and Czech. Larion guides in Russian, Japanese, English and Spanish." }
        },
        {
          "@type": "Question",
          "name": "What areas does Tony cover?",
          "acceptedAnswer": { "@type": "Answer", "text": "Tony covers the full Kansai region: Osaka, Kyoto, Nara, Kobe, Himeji, Arashiyama, Kurama, Fushimi, Kōyasan, and more." }
        }
      ]
    }
    </script>

    <!-- Google Consent Mode v2: default denied until user accepts cookie banner -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 500
      });
    </script>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K9JKN9346D"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-K9JKN9346D');
    </script>

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tony Admin" />
    <meta name="theme-color" content="#E53030" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
