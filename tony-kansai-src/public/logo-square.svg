<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="redOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E53030"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E53030"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E53030" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#E53030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0C0D16"/>

  <!-- Glow -->
  <ellipse cx="540" cy="460" rx="280" ry="260" fill="url(#glow)"/>

  <!-- Torii gate -->
  <!-- Kasagi (top beam) with overhang -->
  <rect x="330" y="300" width="420" height="38" rx="6" fill="url(#redOrange)"/>
  <!-- Kasagi tips (slightly lower) -->
  <rect x="318" y="308" width="24" height="22" rx="4" fill="#FF6B35"/>
  <rect x="738" y="308" width="24" height="22" rx="4" fill="#FF6B35"/>
  <!-- Nuki (second beam) -->
  <rect x="378" y="366" width="324" height="22" rx="4" fill="url(#redOrange)"/>
  <!-- Left pillar -->
  <rect x="394" y="366" width="32" height="270" rx="5" fill="url(#pillarGrad)"/>
  <!-- Right pillar -->
  <rect x="654" y="366" width="32" height="270" rx="5" fill="url(#pillarGrad)"/>

  <!-- Divider line -->
  <rect x="450" y="660" width="180" height="3" rx="2" fill="url(#redOrange)"/>

  <!-- Brand name -->
  <text x="540" y="740" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="68" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="5">TONY KANSAI GUIDE</text>

  <!-- Subtitle -->
  <text x="540" y="798" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="rgba(255,255,255,0.42)" text-anchor="middle" letter-spacing="4">JAPAN  ·  PRIVATE TOURS  ·  KANSAI</text>
</svg>
